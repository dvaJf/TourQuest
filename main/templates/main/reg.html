<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TourQuest – Регистрация</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f2ecd8;
    --btn:      #c49a6c;
    --btn-dark: #b5885a;
    --red:      #b22222;
    --text:     #1a1a1a;
    --mtn1:     #c8d4bb;
    --mtn2:     #b0c0a0;
    --input-bg: #c49a6c;
  }

  body {
    font-family: 'Courier Prime', 'Courier New', monospace;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .phone {
    width: 390px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 28px 0;
    position: relative;
    overflow: hidden;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
    color: var(--text);
  }

  .hero-blur {
    width: 100%;
    height: 140px;
    background: var(--bg);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    margin-bottom: 0;
    flex-shrink: 0;
  }

  .hero-blur svg {
    width: 100%;
    height: 100%;
    filter: blur(5px);
    transform: scale(1.08);
    opacity: 0.55;
  }

  .panel {
    width: 100%;
    background: var(--bg);
    padding: 24px 0 0;
    position: relative;
    z-index: 2;
  }

  .panel-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
  }

  .divider {
    width: 100%;
    height: 1.5px;
    background: var(--text);
    margin-bottom: 22px;
  }

  .input-field {
    display: block;
    width: 100%;
    padding: 15px 20px;
    border: 2px solid var(--text);
    border-radius: 50px;
    background: var(--input-bg);
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    margin-bottom: 14px;
    outline: none;
    transition: background 0.18s, transform 0.12s;
  }
  .input-field::placeholder { color: rgba(26,26,26,0.65); }
  .input-field:focus { background: #ba8e60; transform: scale(1.01); }


  .inpu-field {
    display: block;
    width: 100%;
    padding: 15px 20px;
    border: 2px solid var(--text);
    border-radius: 50px;
    background: rgb(199, 136, 69);
    color: rgb(118, 79, 38);
    font-family: inherit;
    font-size: 16px;
    margin-bottom: 14px;
    outline: none;
    transition: background 0.18s, transform 0.12s;
  }
  .inpu-field::placeholder { color: rgba(198, 187, 88, 0.65); }
  .inpu-field:focus { background: rgb(118, 79, 38) transform: scale(1.01); }

  .hint {
    font-size: 13px;
    margin-top: 4px;
    color: var(--text);
    text-align: center;
  }

  .error {
    color: red;
    text-align: center;
    margin-bottom: 10px;
  }

  .footer-text {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    z-index: 3;
  }

  .mountains {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="phone">
  <h1>Добро пожаловать в TourQuest</h1>


  <div class="panel">
    <p class="panel-title">Регистрация</p>
    <div class="divider"></div>

    <!-- 🔥 ВОТ ГЛАВНОЕ -->
    <form method="POST">
      {% csrf_token %}

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <input class="input-field" type="text" name="username" placeholder="Имя пользователя" required>
      <input class="input-field" type="password" name="password1" placeholder="Придумайте пароль" required>
      <input class="input-field" type="password" name="password2" placeholder="Повторите пароль" required>

      <button class="inpu-field" type="submit">Зарегистрироваться</button>
    </form>
    
    <p class="hint"><a class="hint" href="https://7jwx96tr-8000.euw.devtunnels.ms/login">войти</a> Сложный пароль = лёгкая жизнь</p>
  </div>

  <svg class="mountains" viewBox="0 0 390 200" preserveAspectRatio="none">
    <polygon points="0,200 0,140 60,80 120,130 180,70 240,120 300,65 390,110 390,200" fill="#c8d4bb"/>
  </svg>

  <p class="footer-text">приятной прогулки</p>
</div>
</body>
</html>
