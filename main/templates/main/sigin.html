<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TourQuest – Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e9d6;
    --card-bg: #e8dfc8;
    --brown: #8b6b47;
    --dark: #2c2016;
    --btn: #c49a6c;
    --btn-dark: #b5885a;
    --input-bg: #c49a6c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier Prime', monospace;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .phone {
    width: 390px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 28px 0;
    position: relative;
    overflow: hidden;
  }

  h1 {
    font-family: 'Special Elite', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
    color: var(--dark);
  }

  .panel {
    width: 100%;
    background: var(--bg);
    padding: 24px 0 0;
    position: relative;
    z-index: 2;
  }

  .panel-title {
    font-family: 'Special Elite', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--dark);
  }

  .divider {
    width: 100%;
    height: 1.5px;
    background: var(--dark);
    margin-bottom: 22px;
  }

  .input-field {
    display: block;
    width: 100%;
    padding: 15px 20px;
    border: 2px solid var(--dark);
    border-radius: 50px;
    background: var(--input-bg);
    color: var(--dark);
    font-family: inherit;
    font-size: 16px;
    margin-bottom: 14px;
    outline: none;
    transition: background 0.18s, transform 0.12s;
  }

  .input-field::placeholder { color: rgba(26,26,26,0.65); }
  .input-field:focus { background: #ba8e60; transform: scale(1.01); }

  .btn-submit {
    display: block;
    width: 100%;
    padding: 15px 20px;
    border: 2px solid var(--dark);
    border-radius: 50px;
    background: var(--btn);
    color: var(--dark);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    margin-bottom: 14px;
  }

  .btn-submit:hover { background: var(--btn-dark); transform: scale(1.01); }

  .hint {
    font-size: 13px;
    margin-top: 4px;
    color: var(--brown);
    text-align: center;
  }

  .hint a {
    color: var(--brown);
    font-weight: 700;
    text-decoration: underline;
  }

  .error {
    color: #c0392b;
    text-align: center;
    margin-bottom: 10px;
    font-size: 14px;
  }

  .mountains {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    pointer-events: none;
    z-index: 1;
  }

  .footer-text {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Special Elite', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
    z-index: 3;
  }
</style>
</head>
<body>
<div class="phone">
  <h1>Добро пожаловать в TourQuest</h1>

  <div class="panel">
    <p class="panel-title">Вход</p>
    <div class="divider"></div>

    <form method="POST">
      {% csrf_token %}

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <input class="input-field" type="text" name="username" placeholder="Ваше имя" required>
      <input class="input-field" type="password" name="password" placeholder="Ваш пароль" required>

      <button type="submit" class="btn-submit">Войти</button>
    </form>
    
    <p class="hint"><a href="/reg/">Регистрация</a> | Забыли пароль?</p>
  </div>

  <svg class="mountains" viewBox="0 0 390 200" preserveAspectRatio="none">
    <polygon points="0,200 0,140 60,80 120,130 180,70 240,120 300,65 390,110 390,200" fill="#c8d4bb"/>
  </svg>

  <p class="footer-text">приятной прогулки</p>
</div>
</body>
</html>
