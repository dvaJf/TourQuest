<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Тур завершён! - TourQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0e9d6;
    --card-bg: #e8dfc8;
    --brown: #8b6b47;
    --dark: #2c2016;
    --green: #4a7c59;
    --gold: #d4af37;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, var(--green) 0%, #3d6b4c 50%, #2d5a3c 100%);
    font-family: 'Courier Prime', monospace;
    color: white;
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .confetti {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--gold);
    animation: confetti-fall 3s linear infinite;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
  }

  .trophy {
    font-size: 80px;
    margin-bottom: 20px;
    animation: trophy-bounce 1s ease infinite;
  }

  @keyframes trophy-bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .title {
    font-family: 'Special Elite', serif;
    font-size: 28px;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  .subtitle {
    font-size: 18px;
    margin-bottom: 30px;
    opacity: 0.9;
  }

  .stats-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 25px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .stats-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 5px;
  }

  .stat-label {
    font-size: 12px;
    opacity: 0.9;
  }

  .rewards {
    background: var(--gold);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;
    color: var(--dark);
  }

  .rewards-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .reward-item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: white;
    border: none;
    border-radius: 50px;
    color: var(--green);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .btn-secondary {
    background: transparent;
    border: 2px solid white;
    color: white;
  }

  .btn-secondary:hover {
    background: white;
    color: var(--green);
  }

  .mountains {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    pointer-events: none;
    z-index: 0;
  }

  .mountains svg {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div class="confetti" id="confetti"></div>

<div class="content">
  <div class="trophy"></div>
  
  <h1 class="title">Поздравляем!</h1>
  <p class="subtitle">Вы завершили тур</p>
  
  <div class="stats-card">
    <div class="stats-title">Ваша статистика</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value">{{ points_count }}</div>
        <div class="stat-label"></div>
        <div class="stat-label">Точек</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">{{ duration }}</div>
        <div class="stat-label">Время</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">{{ distance }}км</div>
        <div class="stat-label">Дистанция</div>
      </div>
    </div>
  </div>
  

  
  <a href="{% url 'main' %}" class="btn">← На главную</a>
  <a href="{% url 'shop' %}" class="btn btn-secondary"> В магазин</a>
</div>



<script>
// Конфетти анимация
const confettiContainer = document.getElementById('confetti');
const colors = ['#d4af37', '#ffffff', '#c8d4b0', '#f0e9d6'];

for (let i = 0; i < 50; i++) {
  const piece = document.createElement('div');
  piece.className = 'confetti-piece';
  piece.style.left = Math.random() * 100 + '%';
  piece.style.animationDelay = Math.random() * 3 + 's';
  piece.style.animationDuration = (Math.random() * 3 + 2) + 's';
  piece.style.background = colors[Math.floor(Math.random() * colors.length)];
  piece.style.width = (Math.random() * 10 + 5) + 'px';
  piece.style.height = (Math.random() * 10 + 5) + 'px';
  confettiContainer.appendChild(piece);
}
</script>

</body>
</html>
